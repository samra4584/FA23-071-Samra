<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Elite Sparkle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(212,175,55,0.2);
            border: 1.5px solid #d4af37;
            border-radius: 40px;
            padding: 10px 20px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .back-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
            transform: translateX(-5px);
        }
        
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid transparent;
            border-image: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            border-image-slice: 1;
            width: 450px;
            max-width: 100%;
        }
        .login-container h1 { text-align: center; background: linear-gradient(90deg, #ff6b6b, #ffd93d); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px; }
        .login-container p { text-align: center; color: #ccc; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #d4af37; font-weight: bold; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid #d4af37; border-radius: 8px; color: white; font-size: 16px; }
        input:focus { outline: none; border-color: #f9e07e; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #6bcb77, #4d96ff); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: scale(0.98); }
        .register-link { text-align: center; margin-top: 20px; color: #ccc; }
        .register-link a { color: #d4af37; text-decoration: none; }
        .flash { padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; }
        .flash.success { background: linear-gradient(135deg, #6bcb77, #4d96ff); color: white; }
        .flash.error { background: linear-gradient(135deg, #ff6b6b, #ff4757); color: white; }
        .forgot-link {
            text-align: right;
            margin-bottom: 20px;
        }
        .forgot-link a {
            color: #d4af37;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }
        .forgot-link a:hover {
            text-decoration: underline;
            color: #ffd93d;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Store</a>
    
    <div class="login-container">
        <h1>ELITE SPARKLE</h1>
        <p>Login to your account</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="forgot-link">
                <a href="/forgot_password">Forgot Password?</a>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="register-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
