<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email - Elite Sparkle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            width: 450px;
            text-align: center;
        }
        h1 { color: #d4af37; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #d4af37; text-align: left; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            letter-spacing: 5px;
            font-size: 24px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        .flash { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .flash.success { background: #28a745; color: white; }
        .flash.error { background: #dc3545; color: white; }
        .resend { margin-top: 15px; font-size: 14px; }
        .resend a { color: #d4af37; text-decoration: none; }
        .resend a:hover { text-decoration: underline; }
        .back-link { margin-top: 20px; display: block; color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Verify Your Email</h1>
        <p>Enter the 6-digit code sent to your email to complete registration.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>OTP Code</label>
                <input type="text" name="otp" maxlength="6" required placeholder="123456">
            </div>
            <button type="submit">Verify Email →</button>
        </form>
        <div class="resend">
            <a href="/resend_register_otp">← Didn't receive code? Resend OTP</a>
        </div>
        <a href="/register" class="back-link">← Back to Registration</a>
    </div>
</body>
</html>
